# @package _global_
defaults:
  - test_domain_base
env:
  single_object_scene:
    mesh_gen:
      vis_file: '/tmp/docker/domain/duktig-flatten/flattend2.obj'
      col_file: '/tmp/docker/domain/duktig-flatten/flattend_coacd2.obj'
      env_cloud: '/tmp/docker/domain/duktig-flatten/env_cloud.ply'
      init_cloud: '/tmp/docker/domain/duktig-flatten/env_cloud.ply'
      # goal_cloud: '/tmp/docker/domain/duktig-flatten/init.obj'
      has_ceil: true
      divide_goal: false
      # origin_offset: [-0.06, -0.0, -0.335]
    load_obj_height: true
    use_scale_dr: false
    use_pre_sampled_pose: true
    use_table_pos_dr: true
    lower_table_pos_bound: [-0.04, -0.0]
    upper_table_pos_bound: [-0.04, -0.02]
    min_table_height_offset: 0.6
    max_table_height_offset: 0.6
    base_set: ['bench', 'dgn']
    bench:
      pose_path: '/input/bench/pose/duktig'
    dgn:
      data_path: '/input/DGN/bench'
      pose_path: '/input/DGN/bench/pose/duktig'
    filter_complex: false
    filter_file: null
    filter_dims: [0.01, 0.5, 10.0]
    filter_pose_count: [1, 1000]
  franka:
    height_offset: 0.8
  task:
    min_separation_scale: 0
    avoid_direct_suc: true
    ws_height: 1.0
env_name: 'duktig'
