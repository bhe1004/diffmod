# @package _global_
defaults:
  - test_domain_base
env:
  single_object_scene:
    mesh_gen:
      vis_file: '/tmp/docker/domain/grill/grill.obj'
      col_file: '/tmp/docker/domain/grill/grill_coacd.obj'
      env_cloud: '/tmp/docker/domain/grill/env_cloud.ply'
      has_ceil: false
      divide_goal: false
    base_set: ['bench', 'dgn']
    bench:
      pose_path: '/input/bench/pose/grill'
    dgn:
      data_path: '/input/DGN/bench'
      pose_path: '/input/DGN/bench/pose/grill'
    # filter_key: []
    filter_complex: false
    filter_file: null
    filter_dims: [0.01, 0.5, 10.0]
    filter_pose_count: [1, 1000]
    load_obj_height: true
    use_scale_dr: false
    use_pre_sampled_pose: true
    lower_table_pos_bound: [-0.15, 0.05]
    upper_table_pos_bound: [-0.15, 0.05]
    min_table_height_offset: 0.2
    max_table_height_offset: 0.2
    use_table_dim_dr: false
  franka:
    height_offset: 0.5
  task:
    min_separation_scale: 0
    avoid_direct_suc: true
env_name: 'grill'
