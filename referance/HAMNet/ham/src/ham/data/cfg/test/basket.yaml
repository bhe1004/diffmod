# @package _global_
defaults:
  - test_domain_base
env:
  single_object_scene:
    mesh_gen:
      vis_file: '/tmp/docker/domain/basket/basket.obj'
      # vis_file: '/tmp/docker/domain/basket/basket_coacd.obj'
      col_file: '/tmp/docker/domain/basket/basket_coacd.obj'
      env_cloud: '/tmp/docker/domain/basket/env_cloud.ply'
      init_cloud: '/tmp/docker/domain/basket/init.ply'
      has_ceil: false
      divide_goal: false
    base_set: ['dgn', 'bench']
    bench:
      pose_path: '/input/bench/pose/basket'
    dgn:
      data_path: '/input/DGN/bench'
      pose_path: '/input/DGN/bench/pose/basket'
    filter_complex: false
    filter_file: null
    filter_dims: [0.01, 0.5, 10.0]
    filter_pose_count: [1, 1000]
    load_obj_height: true
    use_scale_dr: false
    min_scale: 0.01
    max_scale: 0.01
    use_table_dim_dr: false
    use_pre_sampled_pose: true
    lower_table_pos_bound: [-0.0973620913046489, -0.00606265]
    upper_table_pos_bound: [-0.0973620913046489, -0.00606265]
    min_table_height_offset: 0.4922891185100104
    max_table_height_offset: 0.4922891185100104
  franka:
    height_offset: 0.1
  task:
    min_separation_scale: 0
    avoid_direct_suc: true
env_name: 'basket'
